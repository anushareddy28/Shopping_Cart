<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your SmartCart account">
    <title>Login - SmartCart</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">Smart<span>Cart</span></a>
            <ul class="nav-links">
                <li><a href="register.html">Register</a></li>
                <li><a href="products.html">Products</a></li>
            </ul>
        </div>
    </header>

    <div class="form-container">
        <h1>Login</h1>
        <div id="formMsg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" name="email" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="loginSubmitBtn">Login</button>
        </form>
        <p class="form-footer">Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <footer class="site-footer">
        <p>SmartCart &copy; 2025</p>
    </footer>
    <div class="toast-container" id="toastContainer"></div>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
