<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse products on SmartCart">
    <title>Products - SmartCart</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">Smart<span>Cart</span></a>
            <button class="hamburger" id="menuToggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html" class="cart-link">Cart <span class="cart-badge" id="cartBadge" style="display:none">0</span></a></li>
                <li><a href="orders.html">Orders</a></li>
                <li id="authNav"></li>
            </ul>
        </div>
    </header>

    <div class="page-content">
        <h1 class="page-title">Products</h1>
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="Search products...">
            <select id="categoryFilter">
                <option value="">All Categories</option>
            </select>
            <select id="sortSelect">
                <option value="newest">Newest First</option>
                <option value="price_low">Price: Low to High</option>
                <option value="price_high">Price: High to Low</option>
                <option value="name">Name: A to Z</option>
            </select>
        </div>
        <div id="productsContainer" class="product-grid">
            <div class="loading"><span class="spinner"></span> Loading products...</div>
        </div>
    </div>

    <footer class="site-footer">
        <p>SmartCart &copy; 2025</p>
    </footer>
    <div class="toast-container" id="toastContainer"></div>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/products.js"></script>
</body>
</html>
